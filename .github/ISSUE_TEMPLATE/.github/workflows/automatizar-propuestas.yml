name: "Automatizar Propuestas de Clientes"

on:
  issues:
    types: [opened]

jobs:
  procesar-propuesta:
    if: contains(github.event.issue.labels.*.name, 'propuesta')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: "Crear archivo de propuesta"
        run: |
          mkdir -p propuestas
          cat > propuestas/${{ github.event.issue.number }}.json << 'EOF'
          {
            "id": ${{ github.event.issue.number }},
            "titulo": "${{ github.event.issue.title }}",
            "usuario": "${{ github.event.issue.user.login }}",
            "fecha": "${{ github.event.issue.created_at }}",
            "estado": "pendiente-revision",
            "url": "${{ github.event.issue.html_url }}"
          }
          EOF

      - name: "Commit y push"
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@acpyasociados.cl"
          git add propuestas/
          git commit -m "add: propuesta #${{ github.event.issue.number }}" || true
          git push
        continue-on-error: true

      - name: "Enviar email"
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.TEAM_EMAIL }}
          subject: "Nueva propuesta #${{ github.event.issue.number }}"
          body: "Nueva propuesta: ${{ github.event.issue.title }}"
        continue-on-error: true

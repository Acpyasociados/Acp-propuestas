name: "Nueva Propuesta de Cliente"
description: "Envía tu propuesta de proyecto o servicio"
title: "[PROPUESTA] "
labels: ["propuesta", "pendiente-revision"]
body:
  - type: markdown
    attributes:
      value: |
        # 📋 Formulario de Propuesta
        Completa este formulario con la información de tu proyecto. Nos pondremos en contacto a la brevedad.

  - type: input
    id: nombre_cliente
    attributes:
      label: "Nombre de la empresa o persona"
      placeholder: "ej: ABC Constructora, Juan Pérez"
      required: true

  - type: input
    id: email
    attributes:
      label: "Email de contacto"
      type: email
      placeholder: "contacto@empresa.cl"
      required: true

  - type: input
    id: telefono
    attributes:
      label: "Teléfono de contacto"
      placeholder: "+56 9 1234 5678"
      required: true

  - type: input
    id: empresa
    attributes:
      label: "Nombre de la empresa (si aplica)"
      placeholder: "Nombre empresa"
      required: false

  - type: textarea
    id: descripcion
    attributes:
      label: "Descripción del proyecto"
      description: "Cuéntanos con detalle qué necesitas, objetivos y requisitos"
      placeholder: |
        Tipo de servicio:
        Ubicación:
        Presupuesto aproximado:
        Plazo requerido:
        Detalles adicionales:
      required: true

  - type: dropdown
    id: tipo_servicio
    attributes:
      label: "Tipo de servicio requerido"
      options:
        - "Diseño y Paisajismo"
        - "Mantenimiento de Áreas Verdes"
        - "Consultoría Ambiental"
        - "Instalación de Sistemas de Riego"
        - "Poda y Control de Plagas"
        - "Limpieza y Preparación de Terrenos"
        - "Otro"
      required: true

  - type: input
    id: ubicacion
    attributes:
      label: "Ubicación del proyecto (ciudad/región)"
      placeholder: "Santiago, Región Metropolitana"
      required: true

  - type: input
    id: presupuesto
    attributes:
      label: "Presupuesto estimado (CLP)"
      placeholder: "ej: $500.000 - $1.000.000"
      required: false

  - type: dropdown
    id: plazo
    attributes:
      label: "Plazo requerido"
      options:
        - "Urgente (1-2 semanas)"
        - "Próximo mes"
        - "1-3 meses"
        - "No definido aún"
      required: true

  - type: textarea
    id: referencias
    attributes:
      label: "Información adicional o referencias"
      placeholder: "Proyectos similares, imágenes referentes, restricciones especiales, etc."
      required: false

  - type: checkbox
    id: terminos
    attributes:
      label: "Acepto que mis datos sean utilizados para contactarme respecto a esta propuesta"
      required: true

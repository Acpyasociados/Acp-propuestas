name: "Nueva Propuesta de Cliente"
description: "Envía tu propuesta de proyecto o servicio"
title: "[PROPUESTA] "
labels: ["propuesta", "pendiente-revision"]
body:
  - type: markdown
    attributes:
      value: |
        # 📋 Formulario de Propuesta
        Completa este formulario con la información de tu proyecto.

  - type: input
    id: nombre_cliente
    attributes:
      label: "Nombre de la empresa o persona"
      placeholder: "ej: ABC Constructora"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: "Email de contacto"
      placeholder: "contacto@empresa.cl"
    validations:
      required: true

  - type: input
    id: telefono
    attributes:
      label: "Teléfono de contacto"
      placeholder: "+56 9 1234 5678"
    validations:
      required: true

  - type: input
    id: empresa
    attributes:
      label: "Nombre de la empresa"
      placeholder: "Mi Empresa"

  - type: textarea
    id: descripcion
    attributes:
      label: "Descripción del proyecto"
      placeholder: "Describe tu proyecto en detalle"
    validations:
      required: true

  - type: dropdown
    id: tipo_servicio
    attributes:
      label: "Tipo de servicio"
      options:
        - "Diseño y Paisajismo"
        - "Mantenimiento"
        - "Consultoría"
        - "Otro"
    validations:
      required: true

  - type: input
    id: ubicacion
    attributes:
      label: "Ubicación"
      placeholder: "Santiago"
    validations:
      required: true

  - type: input
    id: presupuesto
    attributes:
      label: "Presupuesto (opcional)"
      placeholder: "$500.000 - $1.000.000"

  - type: dropdown
    id: plazo
    attributes:
      label: "Plazo"
      options:
        - "Urgente"
        - "Próximo mes"
        - "1-3 meses"
    validations:
      required: true

  - type: textarea
    id: referencias
    attributes:
      label: "Información adicional"
      placeholder: "Detalles extra..."

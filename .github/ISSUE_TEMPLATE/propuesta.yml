name: "Nueva Propuesta de Cliente"
description: "Envía tu propuesta de proyecto o servicio"
title: "[PROPUESTA] "
labels: ["propuesta", "pendiente-revision"]
body:
  - type: markdown
    attributes:
      value: |
        # 📋 Formulario de Propuesta
        Completa este formulario con la información de tu proyecto.

  - type: input
    id: nombre_cliente
    attributes:
      label: "Nombre de la empresa o persona"
      placeholder: "ej: ABC Constructora, Juan Pérez"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: "Email de contacto"
      type: email
      placeholder: "contacto@empresa.cl"
    validations:
      required: true

  - type: input
    id: telefono
    attributes:
      label: "Teléfono de contacto"
      placeholder: "+56 9 1234 5678"
    validations:
      required: true

  - type: input
    id: empresa
    attributes:
      label: "Nombre de la empresa (si aplica)"
      placeholder: "Nombre empresa"

  - type: textarea
    id: descripcion
    attributes:
      label: "Descripción del proyecto"
      description: "Cuéntanos qué necesitas"
      placeholder: "Tipo de servicio, Ubicación, Presupuesto, Plazo"
    validations:
      required: true

  - type: dropdown
    id: tipo_servicio
    attributes:
      label: "Tipo de servicio requerido"
      options:
        - "Diseño y Paisajismo"
        - "Mantenimiento de Áreas Verdes"
        - "Consultoría Ambiental"
        - "Instalación de Sistemas de Riego"
        - "Poda y Control de Plagas"
        - "Otro"
    validations:
      required: true

  - type: input
    id: ubicacion
    attributes:
      label: "Ubicación del proyecto"
      placeholder: "Santiago, Región Metropolitana"
    validations:
      required: true

  - type: input
    id: presupuesto
    attributes:
      label: "Presupuesto estimado (CLP)"
      placeholder: "ej: $500.000 - $1.000.000"

  - type: dropdown
    id: plazo
    attributes:
      label: "Plazo requerido"
      options:
        - "Urgente (1-2 semanas)"
        - "Próximo mes"
        - "1-3 meses"
        - "No definido aún"
    validations:
      required: true

  - type: textarea
    id: referencias
    attributes:
      label: "Información adicional"
      placeholder: "Proyectos similares, restricciones, etc."

  - type: checkboxes
    id: terminos
    attributes:
      label: "Aceptación"
      options:
        - label: "Acepto que mis datos sean usados para contactarme"
          required: true
